<div class="card">

<div class="card-header">

<h4>Departments</h4>

</div>

<div class="card-body">

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>

<th>Name</th>

</tr>

</thead>

<tbody>

<tr *ngFor="let item of departments">

<td>{{item.departmentId}}</td>

<td>{{item.departmentName}}</td>

</tr>

</tbody>

</table>

</div>

</div>
