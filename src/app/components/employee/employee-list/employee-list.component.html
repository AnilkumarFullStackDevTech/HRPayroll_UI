<div class="card">

<div class="card-header">

<h4>Employees</h4>

</div>

<div class="card-body">

<table class="table table-bordered">

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Department</th>

<th>Salary</th>

</tr>

</thead>

<tbody>

<tr *ngFor="let item of employees">

<td>{{item.employeeName}}</td>

<td>{{item.email}}</td>

<td>{{item.departmentName}}</td>

<td>{{item.salary}}</td>

</tr>

</tbody>

</table>

</div>

</div>
